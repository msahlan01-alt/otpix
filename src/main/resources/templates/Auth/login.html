<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/head :: head('Login')}"></head>

    <body class="auth-body">
        <main class="auth-shell">
            <section class="auth-panel">
                <a th:href="@{/}" class="auth-logo">FASHIONCE</a>

                <div class="auth-copy">
                    <p class="auth-eyebrow">WELCOME BACK</p>
                    <h1 class="auth-title">LOGIN</h1>
                    <p class="auth-desc">
                        Masuk untuk mengelola wardrobe, schedule, dan
                        rekomendasi outfit-mu.
                    </p>
                </div>

                <div th:if="${error}" class="flash flash-error">
                    <span th:text="${error}">Username atau password
                        salah.</span>
                </div>

                <div th:if="${success}" class="flash flash-success">
                    <span th:text="${success}">Success</span>
                </div>

                <form th:action="@{/auth/login}" method="post" class="auth-form"
                    data-login-form>
                    <div class="form-group">
                        <label for="username">USERNAME</label>
                        <input
                            id="username"
                            name="username"
                            type="text"
                            autocomplete="username"
                            placeholder="Masukkan username"
                            required />
                    </div>

                    <div class="form-group">
                        <label for="password">PASSWORD</label>
                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            placeholder="Masukkan password"
                            required />
                    </div>

                    <button type="submit" class="btn btn-accent btn-full">
                        LOGIN
                    </button>
                </form>

                <p class="auth-switch">
                    Belum punya akun?
                    <a th:href="@{/auth/register}">Daftar di sini</a>
                </p>
            </section>

            <section class="auth-art">
                <div class="auth-art-card">
                    <span>OUTFIT<br />READY.</span>
                </div>
            </section>
        </main>

        <script th:src="@{/js/main.js}"></script>
    </body>
</html>
