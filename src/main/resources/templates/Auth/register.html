<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragments/head :: head('Register')}"></head>

    <body class="auth-body">
        <main class="auth-shell">
            <section class="auth-panel">
                <a th:href="@{/}" class="auth-logo">OUTFIX</a>

                <div class="auth-copy">
                    <p class="auth-eyebrow">START YOUR STYLE</p>
                    <h1 class="auth-title">REGISTER</h1>
                    <p class="auth-desc">
                        Buat akun untuk mulai membangun wardrobe digital dan
                        rekomendasi outfit.
                    </p>
                </div>

                <div th:if="${error}" class="flash flash-error">
                    <span th:text="${error}">Error</span>
                </div>

                <form th:action="@{/auth/register}" method="post"
                    class="auth-form" data-register-form>
                    <div class="form-group">
                        <label for="name">NAMA</label>
                        <input
                            id="name"
                            name="name"
                            type="text"
                            placeholder="Nama kamu"
                            required />
                    </div>

                    <div class="form-group">
                        <label for="email">EMAIL</label>
                        <input
                            id="email"
                            name="email"
                            type="email"
                            placeholder="email@example.com"
                            required />
                    </div>

                    <div class="form-group">
                        <label for="username">USERNAME</label>
                        <input
                            id="username"
                            name="username"
                            type="text"
                            placeholder="Username"
                            required />
                    </div>

                    <div class="form-group">
                        <label for="password">PASSWORD</label>
                        <input
                            id="password"
                            name="password"
                            type="password"
                            placeholder="Minimal 8 karakter"
                            required />
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">KONFIRMASI PASSWORD</label>
                        <input
                            id="confirmPassword"
                            name="confirmPassword"
                            type="password"
                            placeholder="Ulangi password"
                            required />
                    </div>

                    <button type="submit" class="btn btn-accent btn-full">
                        DAFTAR
                    </button>
                </form>

                <p class="auth-switch">
                    Sudah punya akun?
                    <a th:href="@{/auth/login}">Login di sini</a>
                </p>
            </section>

            <section class="auth-art">
                <div class="auth-art-card">
                    <span>STYLE<br />STARTS<br />HERE.</span>
                </div>
            </section>
        </main>

        <script th:src="@{/js/main.js}"></script>
    </body>
</html>
