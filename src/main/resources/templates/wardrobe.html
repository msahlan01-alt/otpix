<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Wardrobe — OUTFIX</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link
            href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div class="app-shell">
            <aside class="sidebar">
                <div class="sidebar-logo">
                    <a href="/dashboard" class="logo-link">FASHIONCE</a>
                    <p class="logo-sub">SMART WARDROBE</p>
                </div>
                <nav class="sidebar-nav">
                    <a href="/dashboard"
                        class="nav-item"><span>📊</span><span>DASHBOARD</span></a>
                    <a href="/wardrobe"
                        class="nav-item active"><span>👗</span><span>WARDROBE</span></a>
                    <a href="/schedule"
                        class="nav-item"><span>📅</span><span>SCHEDULE</span></a>
                    <a href="/generate"
                        class="nav-item"><span>⚡</span><span>GENERATE</span></a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="user-avatar"><span
                                style="color: var(--accent);">👤</span></div>
                        <div class="user-meta">
                            <p class="user-name" th:text="${username}">USER</p>
                        </div>
                    </div>
                    <form th:action="@{/auth/logout}" method="post"
                        style="display: contents;">
                        <button type="submit"
                            class="logout-btn"><span>🚪</span><span>LOG
                                OUT</span></button>
                    </form>
                </div>
            </aside>

            <main class="main-content">
                <div class="page-header"
                    style="border-bottom: 2px solid var(--foreground);">
                    <div>
                        <p class="page-eyebrow"
                            style="letter-spacing: 3.6px;">MY COLLECTION</p>
                        <h1 class="page-title"
                            style="font-size: clamp(2.5rem, 5vw, 3rem);">WARDROBE</h1>
                    </div>
                    <div class="header-actions">
                        <button onclick="openModal('modal-add-item')"
                            class="btn btn-accent">ADD ITEM</button>
                    </div>
                </div>

                <div class="catalog-wrap" style="padding: var(--sp-8);">
                    <div th:if="${success}" class="flash flash-success"><span
                            th:text="${success}"></span></div>
                    <div th:if="${error}" class="flash flash-error"><span
                            th:text="${error}"></span></div>

                    <div th:if="${not #lists.isEmpty(items)}">
                        <p class="item-count"
                            th:text="${#lists.size(items)} + ' ITEMS'"></p>
                        <div class="item-grid">
                            <div class="item-card" th:each="item : ${items}">
                                <div class="item-image">
                                    <img
                                        th:if="${item.imageUrl != null and not #strings.isEmpty(item.imageUrl)}"
                                        th:src="${item.imageUrl}" alt="Item"
                                        class="item-img" />
                                    <div
                                        th:unless="${item.imageUrl != null and not #strings.isEmpty(item.imageUrl)}"
                                        class="item-placeholder">
                                        <span class="item-emoji">👕</span>
                                    </div>
                                    <div class="cond-badge"
                                        th:text="${item.condition}">GOOD</div>
                                    <form
                                        th:action="@{/wardrobe/{id}/favorite(id=${item.id})}"
                                        method="post"
                                        style="position:absolute; top:8px; right:8px; z-index:2;">
                                        <button type="submit" class="fav-btn"
                                            th:class="${item.favorite} ? 'fav-btn active' : 'fav-btn'">♥</button>
                                    </form>
                                    <span class="worn-badge"
                                        th:text="${item.timesWorn} + '× worn'">0×
                                        worn</span>
                                </div>
                                <div class="item-info">
                                    <span class="item-name"
                                        th:text="${item.name}">Name</span>
                                    <p class="item-meta"
                                        th:text="${item.type} + ' · ' + ${item.category}">Type
                                        · Category</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(items)}" class="empty-state">
                        <p class="empty-title">👕</p>
                        <p class="empty-desc">No items yet. Start adding your
                            clothes!</p>
                        <a href="#"
                            onclick="openModal('modal-add-item'); return false;"
                            class="btn btn-accent">ADD YOUR FIRST ITEM</a>

                        <!-- ═══════════════════════════════════════════════
         MODAL: ADD ITEM
    ═══════════════════════════════════════════════ -->
                        <div class="modal-backdrop" id="modal-add-item"
                            aria-modal="true" role="dialog"
                            aria-labelledby="modal-add-item-title">
                            <div class="modal-box">
                                <div class="modal-header">
                                    <div>
                                        <p class="modal-eyebrow">MY
                                            COLLECTION</p>
                                        <h2 class="modal-title"
                                            id="modal-add-item-title">ADD
                                            ITEM</h2>
                                    </div>
                                    <button class="modal-close"
                                        onclick="closeModal('modal-add-item')"
                                        aria-label="Close">✕</button>
                                </div>
                                <div class="modal-body">
                                    <form class="auth-form" method="post"
                                        th:action="@{/wardrobe/add}">
                                        <div class="form-group">
                                            <label for="modal-name">ITEM
                                                NAME</label>
                                            <input id="modal-name" name="name"
                                                type="text"
                                                placeholder="Black Hoodie"
                                                required />
                                        </div>
                                        <div class="form-group">
                                            <label
                                                for="modal-category">CATEGORY</label>
                                            <select id="modal-category"
                                                name="category" required>
                                                <option value>Pilih
                                                    kategori</option>
                                                <option
                                                    value="TOPS">Tops</option>
                                                <option
                                                    value="BOTTOMS">Bottoms</option>
                                                <option
                                                    value="OUTERWEAR">Outerwear</option>
                                                <option
                                                    value="SHOES">Shoes</option>
                                                <option
                                                    value="ACCESSORIES">Accessories</option>
                                                <option
                                                    value="DRESSES">Dresses</option>
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label
                                                for="modal-color">COLOR</label>
                                            <input id="modal-color" name="color"
                                                type="text"
                                                placeholder="Black" />
                                        </div>
                                        <div class="form-group">
                                            <label
                                                for="modal-condition">CONDITION</label>
                                            <select id="modal-condition"
                                                name="conditionStatus">
                                                <option
                                                    value="GOOD">Good</option>
                                                <option value="NEW">New</option>
                                                <option
                                                    value="WORN">Worn</option>
                                                <option value="NEEDS_CARE">Needs
                                                    Care</option>
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label for="modal-imageUrl">IMAGE
                                                URL</label>
                                            <input id="modal-imageUrl"
                                                name="imageUrl" type="url"
                                                placeholder="https://example.com/image.jpg" />
                                        </div>
                                        <button type="submit"
                                            class="btn btn-accent btn-full">SAVE
                                            ITEM →</button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <style>
    .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.72);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 9000;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }
    .modal-backdrop.open { display: flex; animation: modal-fade-in 0.2s ease; }
    @keyframes modal-fade-in { from { opacity:0; } to { opacity:1; } }
    .modal-box {
        background: var(--background, #fff);
        border: 2px solid var(--foreground, #030213);
        width: 100%;
        max-width: 460px;
        max-height: 90vh;
        overflow-y: auto;
        animation: modal-slide-up 0.22s ease;
    }
    @keyframes modal-slide-up {
        from { opacity:0; transform: translateY(18px) scale(0.98); }
        to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 1.5rem 1.5rem 1rem;
        border-bottom: 2px solid var(--foreground, #030213);
    }
    .modal-eyebrow {
        font-family: var(--font-display, 'Jersey 25', monospace);
        font-size: 0.65rem;
        letter-spacing: 0.25em;
        color: var(--muted-foreground, #717182);
        margin-bottom: 0.25rem;
    }
    .modal-title {
        font-family: var(--font-display, 'Jersey 25', monospace);
        font-size: 2rem;
        letter-spacing: 0.04em;
        color: var(--foreground, #030213);
        line-height: 1;
    }
    .modal-close {
        background: none;
        border: 2px solid var(--foreground, #030213);
        color: var(--foreground, #030213);
        font-family: var(--font-display, 'Jersey 25', monospace);
        font-size: 1rem;
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; flex-shrink: 0; margin-top: 0.25rem;
        transition: background 0.12s, color 0.12s;
    }
    .modal-close:hover { background: var(--foreground,#030213); color: var(--background,#fff); }
    .modal-body { padding: 1.5rem; }
    .modal-body .auth-form { display:flex; flex-direction:column; gap:1rem; }
    .modal-body .form-group { display:flex; flex-direction:column; gap:0.4rem; }
    .modal-body .form-group label {
        font-family: var(--font-display,'Jersey 25',monospace);
        font-size: 0.7rem; letter-spacing: 0.18em; color: var(--foreground,#030213);
    }
    .modal-body .form-group input,
    .modal-body .form-group select {
        background: var(--input-background,#f3f3f5);
        border: 2px solid var(--foreground,#030213);
        color: var(--foreground,#030213);
        font-family: var(--font-display,'Jersey 25',monospace);
        font-size: 0.9rem; padding: 0.6rem 0.75rem;
        outline: none; width: 100%;
        transition: border-color 0.12s, box-shadow 0.12s;
    }
    .modal-body .form-group input:focus,
    .modal-body .form-group select:focus {
        border-color: var(--accent,#d3f75e);
        box-shadow: 0 0 0 3px rgba(211,247,94,0.25);
    }
    .modal-body .form-group input::placeholder { color: var(--muted-foreground,#717182); opacity:0.7; }
    .modal-body .btn-full { width:100%; margin-top:0.5rem; }
    </style>

                        <script>
    function openModal(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.classList.add('open');
        document.body.style.overflow = 'hidden';
        setTimeout(function() { var f = el.querySelector('input'); if(f) f.focus(); }, 60);
    }
    function closeModal(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.classList.remove('open');
        document.body.style.overflow = '';
    }
    document.querySelectorAll('.modal-backdrop').forEach(function(b) {
        b.addEventListener('click', function(e) { if(e.target===b) closeModal(b.id); });
    });
    document.addEventListener('keydown', function(e) {
        if (e.key==='Escape') document.querySelectorAll('.modal-backdrop.open').forEach(function(m){ closeModal(m.id); });
    });
    </script>
                    </body>
                </html>
