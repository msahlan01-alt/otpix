<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Tutorial</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>
    <body>
        <div class="container mt-5">
            <h2>📖 Tutorial Singkat</h2>
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5>👗 Wardrobe</h5>
                            <p>Upload foto dan data pakaianmu.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5>📅 Schedule</h5>
                            <p>Atur jadwal kegiatanmu.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5>⚡ Generate</h5>
                            <p>Dapatkan rekomendasi outfit.</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <form method="post" action="/tutorial/complete">
                    <!-- Hapus baris _csrf karena CSRF di-disable di SecurityConfig -->
                    <button type="submit" class="btn btn-success btn-lg">
                        Selesai & Masuk Dashboard
                    </button>
                </form>
                <a href="/skip-tutorial" class="btn btn-link mt-2">Lewati</a>
            </div>
        </div>
    </body>
</html>
