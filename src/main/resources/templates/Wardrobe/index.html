<!DOCTYPE html>
<html xmlns:th="http:ttp://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${item.name})}"></head>
<body>
<div class="app-shell">
  <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>
  <main class="main-content">

    <div th:if="${success}" class="flash flash-success">
      <span th:text="${success}"></span>
      <button class="flash-close" onclick="this.parentElement.remove()">×</button>
    </div>

    <div class="page-header">
      <div>
        <p class="page-eyebrow">WARDROBE → DETAIL</p>
        <h1 class="page-title" th:text="${item.name}">Item Name</h1>
      </div>
      <div class="header-actions">
        <a th:href="@{/wardrobe/{id}/edit(id=${item.id})}" class="btn btn-outline">✏ EDIT</a>
        <form th:action="@{/wardrobe/{id}/delete(id=${item.id})}" method="post"
              onsubmit="return confirm('Hapus item ini secara permanen?')">
          <button type="submit" class="btn btn-danger">🗑 HAPUS</button>
        </form>
      </div>
    </div>

    <div class="detail-layout">
      <!-- Image -->
      <div class="detail-image-panel">
        <div class="detail-img-wrap">
          <img th:if="${item.imageUrl != null}"
               th:src="@{${item.imageUrl}}" th:alt="${item.name}" class="detail-img"/>
          <div th:unless="${item.imageUrl != null}" class="detail-placeholder"
               th:style="'background:linear-gradient(135deg,' + ${item.color} + '40,' + ${item.secondaryColor} + '20)'">
            <span class="detail-emoji">
              <th:block th:switch="${item.category.name}">
                <span th:case="'TOPS'">👕</span><span th:case="'BOTTOMS'">👖</span>
                <span th:case="'OUTERWEAR'">🧥</span><span th:case="'SHOES'">👟</span>
                <span th:case="'ACCESSORIES'">👜</span><span th:case="'DRESSES'">👗</span>
                <span th:case="*">👔</span>
              </th:block>
            </span>
          </div>
        </div>

        <!-- Favorite toggle -->
        <button class="btn btn-block detail-fav-btn"
                th:classappend="${item.favorite ? ' active' : ''}"
                th:data-id="${item.id}" onclick="toggleFav(this)">
          <span th:text="${item.favorite} ? '♥ FAVORITED' : '♡ ADD TO FAVORITES'">FAV</span>
        </button>
      </div>

      <!-- Info -->
      <div class="detail-info-panel">
        <div class="detail-grid">
          <div class="detail-card">
            <span class="detail-label">KATEGORI</span>
            <span class="detail-value" th:text="${item.category.name}">TOPS</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">FIT</span>
            <span class="detail-value" th:text="${item.fit}">Regular</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">KONDISI</span>
            <span class="cond-badge detail-cond"
                  th:classappend="'cond-' + ${#strings.toLowerCase(item.condition).replace(' ','-')}"
                  th:text="${item.condition}">Good</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">TIMES WORN</span>
            <span class="detail-value" th:text="${item.timesWorn} + '× dipakai'">0×</span>
          </div>
          <div class="detail-card">
            <span class="detail-label">FORMALITY LEVEL</span>
            <div class="formality-dots">
              <span th:each="i : ${#numbers.sequence(1, 5)}"
                    class="formality-dot"
                    th:classappend="${i <= item.formalityLevel ? ' filled' : ''}"></span>
            </div>
          </div>
          <div class="detail-card" th:if="${item.lastWorn != null}">
            <span class="detail-label">TERAKHIR DIPAKAI</span>
            <span class="detail-value"
                  th:text="${#temporals.format(item.lastWorn, 'dd MMM yyyy')}">Date</span>
          </div>
        </div>

        <!-- Colors -->
        <div class="detail-section">
          <p class="detail-label">WARNA</p>
          <div class="color-swatch-row">
            <div class="color-swatch-big" th:style="'background:' + ${item.color}">
              <span th:text="${item.color}">Color</span>
            </div>
            <div class="color-swatch-big"
                 th:if="${item.secondaryColor != null}"
                 th:style="'background:' + ${item.secondaryColor}">
              <span th:text="${item.secondaryColor}">Color</span>
            </div>
          </div>
        </div>

        <!-- Tags -->
        <div class="detail-section" th:unless="${#lists.isEmpty(item.tags)}">
          <p class="detail-label">TAGS</p>
          <div class="tag-row">
            <span th:each="tag : ${item.tags}"
                  th:text="'#' + ${tag.name}" class="tag-chip">tag</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
