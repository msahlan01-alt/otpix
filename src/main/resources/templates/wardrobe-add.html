<form class="auth-form" method="post" th:action="@{/wardrobe/add}">
    <div th:if="${error}" class="flash flash-error">
        <span th:text="${error}">Error</span>
    </div>

    <div class="form-group">
        <label for="name">ITEM NAME</label>
        <input id="name" name="name" type="text" placeholder="Black Hoodie"
            required />
    </div>

    <div class="form-group">
        <label for="category">CATEGORY</label>
        <select id="category" name="category" required>
            <option value>Pilih kategori</option>
            <option value="TOPS">Tops</option>
            <option value="BOTTOMS">Bottoms</option>
            <option value="OUTERWEAR">Outerwear</option>
            <option value="SHOES">Shoes</option>
            <option value="ACCESSORIES">Accessories</option>
            <option value="DRESSES">Dresses</option>
        </select>
    </div>

    <div class="form-group">
        <label for="color">COLOR</label>
        <input id="color" name="color" type="text" placeholder="Black" />
    </div>

    <div class="form-group">
        <label for="conditionStatus">CONDITION</label>
        <select id="conditionStatus" name="conditionStatus">
            <option value="GOOD">Good</option>
            <option value="NEW">New</option>
            <option value="WORN">Worn</option>
            <option value="NEEDS_CARE">Needs Care</option>
        </select>
    </div>

    <div class="form-group">
        <label for="imageUrl">IMAGE URL</label>
        <input id="imageUrl" name="imageUrl" type="url"
            placeholder="https://example.com/image.jpg" />
    </div>

    <button type="submit" class="btn btn-accent btn-full">
        SAVE ITEM
    </button>
</form>
